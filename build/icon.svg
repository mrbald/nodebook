<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7aa2f7"/>
      <stop offset="1" stop-color="#4b62d8"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#16204a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- App-icon background (rounded square / squircle-ish) -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>

  <!-- The glyph: a knowledge graph that also reads as an "N" -->
  <g filter="url(#shadow)">
    <g stroke="#ffffff" stroke-width="48" stroke-linecap="round" fill="none">
      <line x1="336" y1="720" x2="336" y2="304"/>  <!-- left stroke -->
      <line x1="336" y1="304" x2="688" y2="720"/>  <!-- diagonal -->
      <line x1="688" y1="720" x2="688" y2="304"/>  <!-- right stroke -->
    </g>
    <circle cx="336" cy="304" r="62" fill="#ffffff"/>
    <circle cx="336" cy="720" r="62" fill="#ffffff"/>
    <circle cx="688" cy="720" r="62" fill="#ffffff"/>
    <circle cx="688" cy="304" r="62" fill="#ffd27a"/> <!-- one "active" node -->
  </g>
</svg>
