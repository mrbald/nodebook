# Local secret scanning before every commit. Optional but recommended:
#   pipx install pre-commit   (or: brew install pre-commit)
#   pre-commit install
# CI runs the same scan (gitleaks) on every push/PR regardless — see
# .github/workflows/security.yml.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
