name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '21 6 * * 1' # weekly, Monday 06:21 UTC

permissions:
  contents: read

jobs:
  # Fast CVE gate against the GitHub Advisory DB (which incorporates NVD CVEs).
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      # --ignore-scripts: an audit needs the dep tree, not the native rebuild.
      - run: npm ci --ignore-scripts
      - run: npm audit --audit-level=high

  # Thorough scan against OSV.dev (aggregates NVD + GitHub + ecosystem advisories);
  # results also surface in the repo's Security tab.
  osv-scanner:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8

  # Secret scanning — fail the build if a credential/key/token is committed.
  # gitleaks-action is free for public repositories (no license key required).
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so a secret in any past commit is caught
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
